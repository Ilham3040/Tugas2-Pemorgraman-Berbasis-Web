<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
</head>
<body>
    <script src="js/logoutcheck.js"></script>

    <div id="app" class="login" v-cloak>
        <div class="form-box">
            <h1 class="form-title">Selamat Datang</h1>
            <p class="form-sub">Lakukan login otentikasi untuk masuk ke akun anda</p>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="akun@ut.ac.id"
                       v-model.trim="email"
                       :class="{ 'error-input': errors.email }">

                <div class="error-msg" v-show="errors.email" v-text="errors.emailMsg"></div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password"
                       v-model="password"
                       :class="{ 'error-input': errors.password }"
                       @keyup.enter="handleLogin">
                <div class="error-msg" v-show="errors.password" v-text="errors.passwordMsg"></div>
            </div>

            <a href="forgot.html" class="forgot">Lupa password?</a>


            <button class="btn-login"
                    :class="{ 'loading': isLoading }"
                    :disabled="!isFormReady"
                    @click="handleLogin">
                <span v-text="isLoading ? 'Signing in…' : 'Masuk'"></span>
            </button>
        </div>

        <div class="toast" v-show="toast.show" v-text="toast.message"></div>
    </div>

    <style>[v-cloak] { display: none; }</style>
    <script src="js/data.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
