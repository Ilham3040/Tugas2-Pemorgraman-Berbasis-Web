<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemesanan Bahan Ajar</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inventory.css">
</head>
<body>
     <script src="js/admincheck.js"></script>
    <!-- Mobile overlay -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="brand">MyUT<span class="dot">.</span></span>
            <button class="close-btn" onclick="closeSidebar()">✕</button>
        </div>

        <nav class="nav">
            <a href="dashboard.html" class="nav-item">
                <span>Dashboard</span>
            </a>
            <a href="inventory.html" class="nav-item active">
                <span>Inventory Bahan Ajar</span>
            </a>
            <a href="#" class="nav-item">
                <span>Pengaturan</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a id="logout" href="#" class="nav-item logout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Keluar</span>
            </a>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main" id="main">
        <header class="topbar">
            <button class="hamburger" onclick="openSidebar()">
                <span></span><span></span><span></span>
            </button>
            <span class="page-label">Inventory Bahan Ajar</span>
        </header>

        <div class="content">
            <div class="dashboard-title">
                <h1>Inventory Bahan Ajar</h1>
            </div>

            <div class="table-wrapper">
                <table class="book-table">
                    <thead>
                    <tr>
                        <th>Cover</th>
                        <th>Kode Lokasi</th>
                        <th>Kode Barang</th>
                        <th>Nama Barang</th>
                        <th>Jenis Barang</th>
                        <th>Edisi</th>
                        <th>Stok</th>
                    </tr>
                    </thead>
                    <tbody id="book-list">
                        
                    </tbody>
                </table>
            </div>


            <div class="popup">
                <div class="edit-menu">
                    <h2>Edit Bahan Ajar</h2>
                    <div class="row">
                        <div class="field">
                            <label>Kode Lokasi</label>
                            <input type="text" id="kodeLokasi">
                        </div>
                        <div class="field">
                            <label>Kode Barang</label>
                            <input type="text" id="kodeBarang">
                        </div>
                    </div>
                    <div class="field">
                        <label>Nama Barang</label>
                        <input type="text" id="namaBarang">
                    </div>
                    <div class="row">
                        <div class="field">
                            <label>Jenis Barang</label>
                            <select id="jenisBarang">
                                <option>BMP</option>
                                <option>Suplemen</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Edisi</label>
                            <input type="number" id="edisi">
                        </div>
                    </div>
                    <div class="row">
                        <div class="field">
                            <label>Stok</label>
                            <input type="number" id="stok">
                        </div>
                        <div class="field">
                            <label>Cover (path)</label>
                            <input type="text" id="cover">
                        </div>
                    </div>
                    <div class="actions">
                        <button onclick="closePopup()">Batal</button>
                        <button onclick="saveEdit()">Simpan</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/inventory.js"></script>
</body>
</html>
