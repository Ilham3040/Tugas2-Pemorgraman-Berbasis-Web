<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
</head>
<body>
    <script src="js/logincheck.js"></script>

    <div id="app" v-cloak>
        <div class="overlay" :class="{ 'active': isSidebarOpen }" @click="closeSidebar"></div>

        <aside class="sidebar" :class="{ 'open': isSidebarOpen }">
            <div class="sidebar-header">
                <span class="brand" v-html="brandHtml"></span>
                <button class="close-btn" @click="closeSidebar">✕</button>
            </div>
            <nav class="nav">
                <a href="dashboard.html" class="nav-item active"><span>Dashboard</span></a>
                <a v-if="userRole === 'UPBJJ-UT'" href="order.html" class="nav-item">
                    <span>Pemesanan Bahan Ajar</span>
                </a>
                <a v-else-if="userRole !== 'UPBJJ-UT'" href="inventory.html" class="nav-item">
                    <span>Inventory Bahan Ajar</span>
                </a>
                <a href="#" class="nav-item"><span>Pengaturan</span></a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-item logout" @click.prevent="handleLogout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Keluar</span>
                </a>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <button class="hamburger" @click="openSidebar">
                    <span></span><span></span><span></span>
                </button>
                <span class="page-label">Dashboard</span>
            </header>

            <div class="content">
                <h1 class="dashboard-title">Dashboard</h1>

                <div class="profile" v-if="userData">
                    <h3 v-html="greetingHtml" class="greeting"></h3>
                    <div class="profile-picture">
                        <img src="assets/default_profile.jpeg" alt="Profile">
                    </div>
                    <div class="identity">
                        <h3 v-text="userData.nama"></h3>
                        <h3 v-text="userData.role"></h3>
                        <h3 v-text="userData.lokasi"></h3>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <style>[v-cloak] { display: none; }</style>
    <script src="js/data.js"></script>
    
    <script src="js/dashboard.js"></script>
</body>
</html>
