<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <script src="js/logincheck.js"></script>
    <!-- Mobile overlay -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="brand">MyUT<span class="dot">.</span></span>
            <button class="close-btn" onclick="closeSidebar()">✕</button>
        </div>

        <nav class="nav">
            <a href="dashboard.html" class="nav-item active">
                <span>Dashboard</span>
            </a>
            <a id="nonadmin" href="order.html" class="nav-item">
                <span>Pemesanan Bahan Ajar</span>
            </a>
            <a id="admin" href="inventory.html" class="nav-item">
                <span>Inventory Bahan Ajar</span>
            </a>
            <a href="#" class="nav-item">
                <span>Pengaturan</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a id="logout" href="index.html" class="nav-item logout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Keluar</span>
            </a>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main" id="main">
        <header class="topbar">
            <button class="hamburger" onclick="openSidebar()">
                <span></span><span></span><span></span>
            </button>
            <span class="page-label">Dashboard</span>
        </header>

        <div class="content">
            <h1 class="dashboard-title">Dashboard</h1>

            <div class="profile">
                <div class="profile-picture">
                    <img src="assets/default_profile.jpeg" alt="">
                </div>
                <div id="identity" class="identity">
                </div>
            </div>

            <div class="list-matakuliah">
                    <table>
                        <thead>
                            <tr>
                                <th>Kode Mata Kuliah</th>
                                <th>Nama Mata Kuliah</th>
                                <th>Semester</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                            </tr>
                        </tbody>
                    </table>
                </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
