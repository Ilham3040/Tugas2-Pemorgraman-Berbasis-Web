<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="css/forgot.css">
</head>
<body>
    <script>
    loginStatus = sessionStorage.getItem('userId');
    if (loginStatus) {
        window.location.href = 'logout-warning.html'
    }
    </script>
    <div class="login">
    <div class="form-box">
        <h1 class="form-title">Konfirmasi Reset Password</h1>
        <p class="form-sub">Kode konfirmasi akan dikirim ke akun email anda/p>

        <div class="field">
        <label for="email">Masukkan email yang anda gunakan</label>
        <input type="email" id="email" placeholder="akun@edu.com" autocomplete="email">
        <div class="error-msg" id="email-err">Tolong masukkan email yang valid</div>
        </div>

        <button class="btn-login" id="loginBtn">Masuk</button>
    </div>
    </div>

    <a href="index.html" class="back-link">← Kembali</a>

    <div class="toast" id="toast"></div>

    <script src="js/forgot.js"></script>
</body>
</html>
