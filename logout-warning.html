<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesi Aktif Ditemukan</title>
    <link rel="stylesheet" href="css/logout-warning.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
</head>
<body>
    <div id="app" class="login" v-cloak>
        <div class="form-box warning-box">
            <h1 class="form-title">Sesi Aktif</h1>
            <p class="form-sub">Anda mendeteksi adanya login aktif menggunakan akun <strong>{{ userName }}</strong>.</p>
            <p class="form-sub">Apakah anda ingin kembali atau keluar dari akun saat ini?</p>

            <div class="btn-group">
                <button class="btn-secondary" @click="goBack">Kembali</button>
                <button class="btn-logout" @click="forceLogout">Log Out</button>
            </div>
        </div>
    </div>

    <script src="js/logout-warning.js"></script>
</body>
</html>
